# ─────────────────────────────────────────────────────────
# k8s-lifecycle-manager — Configuration File
# ─────────────────────────────────────────────────────────
# DO NOT hardcode IPs or credentials here.
# When you run:  python3 run.py
# The wizard will ask for server IP, username, and
# SSH key or password — then save them here automatically.
# ─────────────────────────────────────────────────────────

report_path: reports
output_path: output
backup_path: backups
log_path: logs
cluster_inventory_file: output/cluster_inventory.json

health_threshold:
  pod_restart_limit: 10

discovery:
  detect_crds: true
  detect_helm: true
  detect_ingress: true
  detect_storage: true

# ─────────────────────────────────────────────────────────
# REMOTE — auto-filled by wizard when you run python3 run.py
# Do not edit manually unless you know what you are doing.
# ─────────────────────────────────────────────────────────
remote:
  host: ""
  user: ""
  port: 22
  platform: ""
  auth_method: ""
  ssh_key: ""
  remote_kubeconfig: ""
  local_kubeconfig: ""
