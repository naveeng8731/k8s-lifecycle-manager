# ─────────────────────────────────────────────────────────
# k8s-lifecycle-manager — Configuration File
# ─────────────────────────────────────────────────────────

report_path: reports
output_path: output
log_path: logs
cluster_inventory_file: output/cluster_inventory.json

# ─────────────────────────────────────────────────────────
# BACKUP PATH
# Where etcd snapshots are saved before each upgrade.
#
# Option 1 — Inside project folder (default)
#   backup_path: output/backups
#
# Option 2 — Separate folder on same server
#   backup_path: /backup/etcd
#   backup_path: /mnt/backup/k8s
#
# Option 3 — NAS / Network drive
#   backup_path: /mnt/nas/k8s-backups
#
# Option 4 — External USB / mounted drive
#   backup_path: /media/usb/k8s-backups
#
# Windows path example (if running locally):
#   backup_path: D:\Backups\k8s
#
# WHY separate location is better for production:
#   If the server disk fails, backups inside the server
#   are lost too. Store on a different disk or NAS.
# ─────────────────────────────────────────────────────────
backup_path: output/backups


health_threshold:
  pod_restart_limit: 10

discovery:
  detect_crds: true
  detect_helm: true
  detect_ingress: true
  detect_storage: true

# ─────────────────────────────────────────────────────────
# REMOTE CONNECTION — auto-filled by wizard
# Run python3 run.py and the wizard will ask for these.
# ─────────────────────────────────────────────────────────
remote:
  host: ""
  user: ""
  port: 22
  platform: ""
  auth_method: ""
  ssh_key: ""
  remote_kubeconfig: ""
  local_kubeconfig: ""
