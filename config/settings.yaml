# ─────────────────────────────────────────────────────────
# k8s-lifecycle-manager — Configuration File
#
# The remote section below is NOT used for connection.
# Connection details are entered via the wizard each run.
# This file should be committed with empty remote section.
# ─────────────────────────────────────────────────────────

report_path: reports
output_path: output
log_path: logs
cluster_inventory_file: output/cluster_inventory.json

# Set this to a separate disk/NAS for production
# Default: output/backups
backup_path: output/backups

health_threshold:
  pod_restart_limit: 10

discovery:
  detect_crds: true
  detect_helm: true
  detect_ingress: true
  detect_storage: true

# ─────────────────────────────────────────────────────────
# REMOTE — intentionally empty
# Connection details are entered via wizard at runtime.
# Never hardcode server IPs here.
# ─────────────────────────────────────────────────────────
remote:
  host: ""
  user: ""
  port: 22
  platform: ""
  auth_method: ""
  ssh_key: ""
  remote_kubeconfig: ""
  local_kubeconfig: ""