# ─────────────────────────────────────────────────────────
# REMOTE MODE INVENTORY
# Used when running k8s-lifecycle-manager from your
# local machine (Windows/Linux/Mac) against a remote cluster
#
# HOW TO USE:
#   1. Fill in your remote server IP/hostname below
#   2. Set the SSH user and key path
#   3. Run: python3 run.py --mode remote
# ─────────────────────────────────────────────────────────

[k8s_cluster]
# Replace with your actual server IP or hostname
devdc3 ansible_host=192.168.115.3 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

# Multiple nodes example:
# master1 ansible_host=10.0.0.1 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa
# master2 ansible_host=10.0.0.2 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa
# worker1 ansible_host=10.0.0.3 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/id_rsa

[k8s_cluster:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
ansible_python_interpreter=/usr/bin/python3

# ─────────────────────────────────────────────────────────
# LOCAL MODE (original — runs directly on the cluster node)
# ─────────────────────────────────────────────────────────
[local]
localhost ansible_connection=local
